parameters:
  - name: acrServiceConnection
    type: string
  - name: acrLoginServer
    type: string
  - name: imageRepository
    type: string
  - name: localImageTag
    type: string
  - name: imageTags
    type: object

steps:
  - task: DownloadPipelineArtifact@2
    displayName: Download Docker image artifact
    inputs:
      artifact: docker-image
      path: $(Pipeline.Workspace)/docker-image

  - bash: |
      set -euo pipefail
      docker load -i "$(Pipeline.Workspace)/docker-image/image.tar"
    displayName: Load Docker image

  - task: Docker@2
    displayName: Log in to Azure Container Registry
    inputs:
      command: login
      containerRegistry: ${{ parameters.acrServiceConnection }}

  - ${{ each tag in parameters.imageTags }}:
    - bash: |
        set -euo pipefail
        if [ -z "${ACR_LOGIN_SERVER:-}" ]; then
          echo "##vso[task.logissue type=error]acrLoginServer is empty; cannot tag image"
          exit 1
        fi
        SOURCE="${IMAGE_REPOSITORY}:${LOCAL_IMAGE_TAG}"
        TARGET="${ACR_LOGIN_SERVER}/${IMAGE_REPOSITORY}:${IMAGE_TAG}"
        echo "Tagging ${SOURCE} -> ${TARGET}"
        docker tag "${SOURCE}" "${TARGET}"
      displayName: Tag image — ${{ tag }}
      env:
        ACR_LOGIN_SERVER: ${{ parameters.acrLoginServer }}
        IMAGE_REPOSITORY: ${{ parameters.imageRepository }}
        LOCAL_IMAGE_TAG: ${{ parameters.localImageTag }}
        IMAGE_TAG: ${{ tag }}

  - task: Docker@2
    displayName: Push image to ACR
    inputs:
      command: push
      containerRegistry: ${{ parameters.acrServiceConnection }}
      repository: ${{ parameters.imageRepository }}
      tags: |
        ${{ join('\n', parameters.imageTags) }}
