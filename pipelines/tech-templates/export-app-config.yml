# Exports cicd:* keys from Azure App Configuration into pipeline variables.
# Uses AzureAppConfigurationExport@10 (read FROM App Config).
# Note: AzureAppConfigurationImport@10 pushes config files TO App Config — use that
# in an infra/sync pipeline, not here. See:
# https://learn.microsoft.com/en-us/azure/devops/pipelines/tasks/reference/azure-app-configuration-export-v10

parameters:
  - name: azureServiceConnection
    type: string
  - name: appConfigEndpoint
    type: string
  - name: appConfigLabel
    type: string

steps:
  - task: AzureAppConfigurationExport@10
    displayName: Export CI/CD config from App Configuration
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      AppConfigurationEndpoint: ${{ parameters.appConfigEndpoint }}
      SelectionMode: Default
      KeyFilter: 'cicd:*'
      Label: ${{ parameters.appConfigLabel }}
      TrimKeyPrefix: 'cicd:'

  # App Config yields names like acr:login-server. Colons break $(var) expansion in bash
  # (treated as command substitution → empty registry → "invalid reference format").
  # Map to a colon-free alias for Docker tag/push/pull steps.
  - bash: |
      set -euo pipefail
      if [ -z "${ACR_LOGIN_SERVER:-}" ]; then
        echo "##vso[task.logissue type=error]acr:login-server is empty after App Configuration export"
        exit 1
      fi
      echo "ACR login server: ${ACR_LOGIN_SERVER}"
      echo "##vso[task.setvariable variable=acrLoginServer]${ACR_LOGIN_SERVER}"
    displayName: Map ACR login server to safe variable
    env:
      ACR_LOGIN_SERVER: $(acr:login-server)
