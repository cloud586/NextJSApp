parameters:
  - name: workingDirectory
    type: string
  - name: imageRepository
    type: string
  - name: localImageTag
    type: string
  - name: acrServiceConnection
    type: string
  - name: acrLoginServer
    type: string
  - name: baseImageRepository
    type: string
    default: alma-ubi
  - name: baseImageTag
    type: string
    default: latest

steps:
  - task: Docker@2
    displayName: Log in to ACR for base image pull
    inputs:
      command: login
      containerRegistry: ${{ parameters.acrServiceConnection }}

  - bash: |
      set -euo pipefail
      if [ -z "${ACR_LOGIN_SERVER:-}" ]; then
        echo "##vso[task.logissue type=error]acrLoginServer is empty; cannot pull base image"
        exit 1
      fi
      ACR_IMAGE="${ACR_LOGIN_SERVER}/${BASE_IMAGE_REPOSITORY}:${BASE_IMAGE_TAG}"
      LOCAL_IMAGE="${BASE_IMAGE_REPOSITORY}:${BASE_IMAGE_TAG}"
      echo "Pulling ${ACR_IMAGE}"
      docker pull "${ACR_IMAGE}"
      docker tag "${ACR_IMAGE}" "${LOCAL_IMAGE}"
      echo "Tagged ${LOCAL_IMAGE} for Dockerfile.runtime"
    displayName: Pull and tag alma-ubi base image
    env:
      ACR_LOGIN_SERVER: ${{ parameters.acrLoginServer }}
      BASE_IMAGE_REPOSITORY: ${{ parameters.baseImageRepository }}
      BASE_IMAGE_TAG: ${{ parameters.baseImageTag }}

  # Docker@2 build without containerRegistry still prefixes tags with registries
  # found in docker config (from the login above). Logout so the image stays
  # local as imageRepository:localImageTag (required by save / Trivy / push).
  - task: Docker@2
    displayName: Log out of ACR before local build
    inputs:
      command: logout
      containerRegistry: ${{ parameters.acrServiceConnection }}

  # Drop vite/esbuild and other gobinary-heavy dev tooling from the build
  # context. Runtime image only needs production deps for New Relic sync.
  - bash: |
      set -euo pipefail
      npm prune --omit=dev
      if [ -d node_modules/esbuild ] || [ -d node_modules/@esbuild ]; then
        echo "##vso[task.logissue type=error]esbuild still present after npm prune --omit=dev"
        exit 1
      fi
      echo "Dev dependencies pruned; esbuild not present in build context"
    displayName: Prune devDependencies before Docker build
    workingDirectory: $(Build.SourcesDirectory)/${{ parameters.workingDirectory }}

  - task: Docker@2
    displayName: Build runtime image (Dockerfile.runtime)
    inputs:
      command: build
      Dockerfile: $(Build.SourcesDirectory)/${{ parameters.workingDirectory }}/Dockerfile.runtime
      buildContext: $(Build.SourcesDirectory)/${{ parameters.workingDirectory }}
      repository: ${{ parameters.imageRepository }}
      tags: ${{ parameters.localImageTag }}
      addPipelineData: false
      addBaseImageData: false

  - bash: |
      set -euo pipefail
      mkdir -p "$(Build.ArtifactStagingDirectory)/docker"
      docker save "${{ parameters.imageRepository }}:${{ parameters.localImageTag }}" \
        -o "$(Build.ArtifactStagingDirectory)/docker/image.tar"
    displayName: Save Docker image for publish stages

  - task: PublishPipelineArtifact@1
    displayName: Publish Docker image artifact
    inputs:
      targetPath: $(Build.ArtifactStagingDirectory)/docker
      artifact: docker-image
      publishLocation: pipeline
