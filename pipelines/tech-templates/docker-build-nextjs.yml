parameters:
  - name: workingDirectory
    type: string
  - name: imageRepository
    type: string
  - name: localImageTag
    type: string
  - name: acrServiceConnection
    type: string
  - name: acrLoginServer
    type: string
  - name: baseImageRepository
    type: string
    default: alma-ubi
  - name: baseImageTag
    type: string
    default: latest

steps:
  - task: Docker@2
    displayName: Log in to ACR for base image pull
    inputs:
      command: login
      containerRegistry: ${{ parameters.acrServiceConnection }}

  - bash: |
      set -euo pipefail
      if [ -z "${ACR_LOGIN_SERVER:-}" ]; then
        echo "##vso[task.logissue type=error]acrLoginServer is empty; cannot pull base image"
        exit 1
      fi
      ACR_IMAGE="${ACR_LOGIN_SERVER}/${BASE_IMAGE_REPOSITORY}:${BASE_IMAGE_TAG}"
      LOCAL_IMAGE="${BASE_IMAGE_REPOSITORY}:${BASE_IMAGE_TAG}"
      echo "Pulling ${ACR_IMAGE}"
      docker pull "${ACR_IMAGE}"
      docker tag "${ACR_IMAGE}" "${LOCAL_IMAGE}"
      echo "Tagged ${LOCAL_IMAGE} for Dockerfile.runtime"
    displayName: Pull and tag alma-ubi base image
    env:
      ACR_LOGIN_SERVER: ${{ parameters.acrLoginServer }}
      BASE_IMAGE_REPOSITORY: ${{ parameters.baseImageRepository }}
      BASE_IMAGE_TAG: ${{ parameters.baseImageTag }}

  - task: Docker@2
    displayName: Build runtime image (Dockerfile.runtime)
    inputs:
      command: build
      Dockerfile: $(Build.SourcesDirectory)/${{ parameters.workingDirectory }}/Dockerfile.runtime
      buildContext: $(Build.SourcesDirectory)/${{ parameters.workingDirectory }}
      repository: ${{ parameters.imageRepository }}
      tags: |
        ${{ parameters.localImageTag }}

  - bash: |
      set -euo pipefail
      mkdir -p "$(Build.ArtifactStagingDirectory)/docker"
      docker save "${IMAGE_REPOSITORY}:${LOCAL_IMAGE_TAG}" \
        -o "$(Build.ArtifactStagingDirectory)/docker/image.tar"
    displayName: Save Docker image for publish stages
    env:
      IMAGE_REPOSITORY: ${{ parameters.imageRepository }}
      LOCAL_IMAGE_TAG: ${{ parameters.localImageTag }}

  - task: PublishPipelineArtifact@1
    displayName: Publish Docker image artifact
    inputs:
      targetPath: $(Build.ArtifactStagingDirectory)/docker
      artifact: docker-image
      publishLocation: pipeline
