parameters:
  - name: dockerfilePath
    type: string
  - name: buildContext
    type: string
  - name: imageRepository
    type: string
  - name: localImageTag
    type: string

steps:
  - task: Docker@2
    displayName: Build base image
    inputs:
      command: build
      Dockerfile: $(Build.SourcesDirectory)/${{ parameters.dockerfilePath }}
      buildContext: $(Build.SourcesDirectory)/${{ parameters.buildContext }}
      repository: ${{ parameters.imageRepository }}
      tags: |
        ${{ parameters.localImageTag }}
      addPipelineData: false
      addBaseImageData: false

  - bash: |
      set -euo pipefail
      mkdir -p "$(Build.ArtifactStagingDirectory)/docker"
      docker save "${{ parameters.imageRepository }}:${{ parameters.localImageTag }}" \
        -o "$(Build.ArtifactStagingDirectory)/docker/image.tar"
    displayName: Save Docker image for publish stages

  - task: PublishPipelineArtifact@1
    displayName: Publish Docker image artifact
    inputs:
      targetPath: $(Build.ArtifactStagingDirectory)/docker
      artifact: docker-image
      publishLocation: pipeline
