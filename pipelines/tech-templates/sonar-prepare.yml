parameters:
  - name: workingDirectory
    type: string
  - name: sonarCloudServiceConnection
    type: string
    default: sonarcloud-sutoremu

steps:
  - task: SonarCloudPrepare@4
    displayName: SonarCloud prepare
    env:
      SONAR_TOKEN: $(sonar:token)
    inputs:
      SonarCloud: ${{ parameters.sonarCloudServiceConnection }}
      organization: $(sonar:organization)
      scannerMode: CLI
      configMode: file
      configFile: $(Build.SourcesDirectory)/${{ parameters.workingDirectory }}/sonar-project.properties
      extraProperties: |
        sonar.login=$(sonar:token)
        sonar.organization=$(sonar:organization)
        sonar.projectKey=$(sonar:project-key)
        sonar.projectBaseDir=$(Build.SourcesDirectory)/${{ parameters.workingDirectory }}
