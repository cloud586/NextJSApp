parameters:
  - name: workingDirectory
    type: string

steps:
  - task: NodeTool@0
    displayName: Use Node.js 22.x
    inputs:
      versionSpec: '22.x'

  - task: Cache@2
    displayName: Cache npm packages
    inputs:
      key: 'npm | "$(Agent.OS)" | ${{ parameters.workingDirectory }}/package-lock.json'
      restoreKeys: |
        npm | "$(Agent.OS)"
      path: $(HOME)/.npm

  - script: npm ci --prefer-offline
    displayName: npm ci
    workingDirectory: $(Build.SourcesDirectory)/${{ parameters.workingDirectory }}
